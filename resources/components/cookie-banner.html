<!-- Prunex Cookie Banner Component -->
<div class="cookie-banner" role="dialog" aria-label="Cookie consent">
  <div class="cookie-banner-inner">
    <p><span data-i18n="cookie_banner.text">We use cookies to improve your experience. By continuing to visit this site you agree to our use of cookies.</span> <a href="{{BASE}}pages/cookies.html" data-i18n="cookie_banner.learn_more">Learn more</a>.</p>
    <div class="cookie-banner-actions">
      <button class="btn btn-sm" id="cookie-decline" data-i18n="cookie_banner.decline">Decline</button>
      <button class="btn btn-primary btn-sm" id="cookie-accept" data-i18n="cookie_banner.accept">Accept</button>
    </div>
  </div>
</div>
